<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Two Leaves and a Bud - Responsive Web Design</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto+Mono:100,200,300,regular,500,600,700,100italic,200italic,300italic,italic,500italic,600italic,700italic"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <nav>
        <i class="ri-menu-line"></i>
        <div class="nav-part1">
          <h3>Shop</h3>
          <h3>Learn</h3>
          <h3>Reviews</h3>
        </div>
        <div class="nav-part2">
          <img
            src="https://www.twoleavestea.com/cdn/shop/files/Twoleaves_logo.svg?v=1768205424&width=420"
            alt="Two Leaves and a Bud"
          />
        </div>
        <div class="nav-part3">
          <h3>My Account</h3>
          <h3>Cafe & Wholesale Partners</h3>
          <h3>Tea Journal</h3>
          <svg
            width="22"
            height="31"
            viewBox="0 0 22 31"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            data-acsb-hidden="true"
            role="presentation"
          >
            <path
              d="M21.5 10V24.5C21.5 27.5376 19.0376 30 16 30H6C2.96243 30 0.5 27.5376 0.5 24.5V10H21.5Z"
              stroke="#201C1A"
            ></path>
            <path
              d="M5 9.5V6.5C5 3.18629 7.68629 0.5 11 0.5C14.3137 0.5 17 3.18629 17 6.5V9.5"
              stroke="#201C1A"
            ></path>
          </svg>
        </div>
      </nav>
      <div id="section1">
        <h1>A cup that fits the moment.</h1>
        <p>
          From compostable whole leaf tea sachets and iced tea to tea lattes and
          matcha, we’ve got something for everyone.
        </p>
        <button>Shop now</button>
      </div>
      <section id="section-2">
        <div class="section-2-heading">
          <h1>
            A <span>great</span> cup starts with a careful pluck - the top two
            leaves and a bud.
          </h1>
        </div>
        <div class="section-2-btn">
          <button>Best sellers</button>
        </div>

        <div class="section-2-container"></div>
      </section>
    </main>
  </body>
</html>
