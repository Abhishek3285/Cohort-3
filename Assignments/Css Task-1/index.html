<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Task - Assignment One</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="box" id="box1">
        <div class="pikachu">
          <img src="./assets/pikachuu.png" alt="Pikachu image" />
        </div>
        <div class="logo">
          <img src="./assets/612ce4761b9679000402af1c.png" alt="Pokemon logo" />
        </div>
        <div class="content">
          <h5 class="subHeading">POKEMON GEN I</h5>
          <h1 class="mainHeading">Pikachu</h1>
          <p class="para">
            Pikachu is an Electric-type Pokémon introduced in Generation I.
            Pikachu are small, chubby,<br />
            and incredibly cute mouse-like Pokémon. <br />
            They are almost completely covered by <br />
            yellow fur.
          </p>
          <div class="numberBox">
            <h2 class="number">01/08</h2>
          </div>
        </div>
        <div class="pokeball">
          <img src="./assets/pokemon ball.png" alt="Pokeball " />
        </div>
      </div>
      <div class="box" id="box2">
        <i class="ri-menu-line menu"></i>
        <div class="dott1"></div>
        <div class="dott2"></div>
        <div class="dott3"></div>
        <div class="dott4"></div>
        <div class="dott5"></div>
      </div>
    </div>
  </body>
</html>
